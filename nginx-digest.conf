server {
    listen 80;
    root /srv/digest;

    location = / {
        return 301 /latest.html;
    }

    location / {
        try_files $uri =404;
    }

    location /health {
        access_log off;
        return 200;
    }

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
